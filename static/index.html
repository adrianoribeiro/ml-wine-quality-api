<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .container {
            max-width: 520px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #646cff;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #646cff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #535bf2; }
        button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .result {
            margin-top: 24px;
            padding: 24px;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #333;
            display: none;
        }
        .result.show { display: block; }
        .quality-score {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin: 8px 0;
        }
        .quality-label {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .drift-alert {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .drift-ok {
            background: #0a2a0a;
            border: 1px solid #1a4a1a;
            color: #4ade80;
        }
        .drift-warning {
            background: #2a1a0a;
            border: 1px solid #4a3a1a;
            color: #fbbf24;
        }
        .drift-detail {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #ccc;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
        }
        .footer a { color: #646cff; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .loading { text-align: center; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wine Quality Predictor</h1>
        <p class="subtitle">Predict red wine quality based on chemical properties using ML</p>

        <div class="form-grid">
            <div class="field">
                <label>Fixed Acidity</label>
                <input type="number" id="fixed_acidity" value="7.4" step="0.1">
            </div>
            <div class="field">
                <label>Volatile Acidity</label>
                <input type="number" id="volatile_acidity" value="0.7" step="0.01">
            </div>
            <div class="field">
                <label>Citric Acid</label>
                <input type="number" id="citric_acid" value="0.0" step="0.01">
            </div>
            <div class="field">
                <label>Residual Sugar</label>
                <input type="number" id="residual_sugar" value="1.9" step="0.1">
            </div>
            <div class="field">
                <label>Chlorides</label>
                <input type="number" id="chlorides" value="0.076" step="0.001">
            </div>
            <div class="field">
                <label>Free SO2</label>
                <input type="number" id="free_sulfur_dioxide" value="11.0" step="1">
            </div>
            <div class="field">
                <label>Total SO2</label>
                <input type="number" id="total_sulfur_dioxide" value="34.0" step="1">
            </div>
            <div class="field">
                <label>Density</label>
                <input type="number" id="density" value="0.9978" step="0.0001">
            </div>
            <div class="field">
                <label>pH</label>
                <input type="number" id="pH" value="3.51" step="0.01">
            </div>
            <div class="field">
                <label>Sulphates</label>
                <input type="number" id="sulphates" value="0.56" step="0.01">
            </div>
            <div class="field" style="grid-column: 1 / -1;">
                <label>Alcohol (%)</label>
                <input type="number" id="alcohol" value="9.4" step="0.1">
            </div>
        </div>

        <button id="predictBtn" onclick="predict()">Predict Quality</button>

        <div class="result" id="result">
            <div class="quality-label">Predicted Quality</div>
            <div class="quality-score" id="qualityScore">-</div>
            <div class="quality-label" id="qualityText"></div>
            <div id="driftInfo"></div>
        </div>

        <div class="footer">
            <p>ML Engineering Portfolio Project</p>
            <p style="margin-top: 4px;">
                <a href="https://github.com/adrianoribeiro/ml-wine-quality-api" target="_blank">GitHub</a>
                &middot;
                <a href="/docs" target="_blank">API Docs</a>
                &middot;
                <a href="/metrics" target="_blank">Metrics</a>
            </p>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const fields = [
            'fixed_acidity', 'volatile_acidity', 'citric_acid', 'residual_sugar',
            'chlorides', 'free_sulfur_dioxide', 'total_sulfur_dioxide',
            'density', 'pH', 'sulphates', 'alcohol'
        ];

        function getQualityColor(q) {
            if (q >= 7) return '#4ade80';
            if (q >= 5) return '#fbbf24';
            return '#f87171';
        }

        function getQualityText(q) {
            if (q >= 7) return 'Excellent';
            if (q >= 6) return 'Good';
            if (q >= 5) return 'Average';
            return 'Below Average';
        }

        async function predict() {
            const btn = document.getElementById('predictBtn');
            btn.disabled = true;
            btn.textContent = 'Predicting...';

            const data = {};
            fields.forEach(f => {
                data[f] = parseFloat(document.getElementById(f).value);
            });

            try {
                const res = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                const score = document.getElementById('qualityScore');
                const text = document.getElementById('qualityText');
                const driftInfo = document.getElementById('driftInfo');

                score.textContent = result.quality;
                score.style.color = getQualityColor(result.quality);
                text.textContent = getQualityText(result.quality);

                if (result.drift && result.drift.drift_detected) {
                    let alertsHtml = '<div class="drift-alert drift-warning">';
                    alertsHtml += '<strong>Drift detected</strong>';
                    result.drift.alerts.forEach(a => {
                        alertsHtml += `<div class="drift-detail">${a.message}</div>`;
                    });
                    alertsHtml += '</div>';
                    driftInfo.innerHTML = alertsHtml;
                } else if (result.drift) {
                    driftInfo.innerHTML = '<div class="drift-alert drift-ok">All values within expected range</div>';
                } else {
                    driftInfo.innerHTML = '';
                }

                document.getElementById('result').classList.add('show');
            } catch (err) {
                alert('Error connecting to API: ' + err.message);
            }

            btn.disabled = false;
            btn.textContent = 'Predict Quality';
        }
    </script>
</body>
</html>
